<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59ff"/>
      <stop offset="100%" stop-color="#6b2ff0"/>
    </linearGradient>
    <radialGradient id="shine" cx="40%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>
  <rect width="512" height="512" rx="115" ry="115" fill="url(#shine)"/>
  <!-- 기준선 (차트를 위쪽으로 올려 텍스트 공간 확보) -->
  <rect x="96" y="330" width="320" height="16" rx="8" fill="white" opacity="0.95"/>
  <!-- 막대 1 (낮음): y=230, height=100 → 기준선에 맞닿음 -->
  <rect x="110" y="230" width="68" height="100" rx="10" fill="white" opacity="0.95"/>
  <!-- 막대 2 (중간): y=170, height=160 -->
  <rect x="222" y="170" width="68" height="160" rx="10" fill="white" opacity="0.95"/>
  <!-- 막대 3 (높음): y=110, height=220 -->
  <rect x="334" y="110" width="68" height="220" rx="10" fill="white" opacity="0.95"/>
  <!-- 트렌드 선 (각 막대 상단 중앙 연결) -->
  <polyline points="144,198 256,138 368,78" fill="none" stroke="white"
    stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  <!-- 화살표 머리 -->
  <polygon points="368,78 322,72 348,108" fill="white" opacity="0.95"/>
  <!-- 하단 텍스트 -->
  <text x="256" y="448" text-anchor="middle" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif"
    font-size="50" font-weight="700" fill="white" opacity="0.95">제품시장동향</text>
</svg>
